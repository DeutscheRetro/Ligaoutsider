<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsarchiv – Ligaoutsider.de</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <span>Saison 2025/26</span>
      <div class="topbar-right">
        <a href="#">Anmelden</a>
        <a href="#">Registrieren</a>
      </div>
    </div>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-liga">Liga</span><span class="logo-outsider">outsider</span><span class="logo-de">.de</span>
      </a>
      <form class="search-form" onsubmit="return false;">
        <input type="search" id="search-input" class="search-input" placeholder="Suche…" autocomplete="off" />
      </form>
    </div>
  </header>

  <div class="archiv-wrap">
    <div class="feed-header">
      <h2>Newsarchiv</h2>
      <span class="feed-count" id="feed-count"></span>
    </div>

    <ul class="feed" id="feed">
      <li class="feed-loading">Lade Artikel …</li>
    </ul>

    <div id="load-more-wrap" style="display:none;text-align:center;margin:24px 0">
      <button class="mehr-button" id="load-more-btn">Weitere laden</button>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-copy">© Ligaoutsider.de, 2026</p>
      <nav class="footer-nav">
        <a href="#">Impressum</a>
        <a href="#">Datenschutzerklärung</a>
      </nav>
    </div>
  </footer>

  <script>
    let alleArtikel = [];
    let angezeigt  = 0;
    const PRO_SEITE = 20;

    function feedItem(a) {
      return `<li class="feed-item">
        <a href="${a.pfad}" class="feed-wappen-link">
          ${a.wappen_url
            ? `<img src="${a.wappen_url}" class="feed-wappen" alt="Wappen" />`
            : `<div class="club-logo" style="--c:#333;--tc:#aaa">BL</div>`
          }
        </a>
        <div class="feed-body">
          <span class="feed-badge" style="background:${a.badge_bg};color:${a.badge_fg}">${a.badge}</span>
          <a href="${a.pfad}" class="feed-title">${a.titel}</a>
          <div class="feed-meta"><span class="feed-time">${a.datum}</span></div>
        </div>
      </li>`;
    }

    function render(liste, reset) {
      const feed = document.getElementById('feed');
      const wrap = document.getElementById('load-more-wrap');
      if (reset) { feed.innerHTML = ''; angezeigt = 0; }
      const naechste = liste.slice(angezeigt, angezeigt + PRO_SEITE);
      if (naechste.length === 0 && angezeigt === 0) {
        feed.innerHTML = '<li class="feed-loading">Keine Artikel gefunden.</li>';
      } else {
        feed.insertAdjacentHTML('beforeend', naechste.map(feedItem).join(''));
        angezeigt += naechste.length;
      }
      wrap.style.display = angezeigt < liste.length ? 'block' : 'none';
    }

    let gefilterteListe = [];

    fetch('feed.json')
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(artikel => {
        alleArtikel    = artikel;
        gefilterteListe = artikel;
        document.getElementById('feed-count').textContent = artikel.length + ' Artikel';

        if (artikel.length === 0) {
          document.getElementById('feed').innerHTML =
            '<li class="feed-loading">Noch keine Artikel. Starte generate.py!</li>';
          return;
        }

        render(gefilterteListe, true);

        document.getElementById('search-input').addEventListener('input', e => {
          const q = e.target.value.trim().toLowerCase();
          gefilterteListe = q
            ? alleArtikel.filter(a => a.titel.toLowerCase().includes(q))
            : alleArtikel;
          document.getElementById('feed-count').textContent = gefilterteListe.length + ' Artikel';
          render(gefilterteListe, true);
        });

        document.getElementById('load-more-btn').addEventListener('click', () => {
          render(gefilterteListe, false);
        });
      })
      .catch(() => {
        document.getElementById('feed').innerHTML =
          '<li class="feed-loading">feed.json nicht gefunden.</li>';
      });
  </script>

</body>
</html>
