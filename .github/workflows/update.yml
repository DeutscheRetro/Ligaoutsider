name: Neue Artikel generieren

on:
  schedule:
    - cron: '17 7 * * *'    # 09:17
    - cron: '52 8 * * *'    # 10:52  (+95min)
    - cron: '29 9 * * *'    # 11:29  (+37min)
    - cron: '4 10 * * *'    # 12:04  (+35min)
    - cron: '51 10 * * *'   # 12:51  (+47min)
    - cron: '38 11 * * *'   # 13:38  (+47min)
    - cron: '11 13 * * *'   # 15:11  (+93min)
    - cron: '47 13 * * *'   # 15:47  (+36min)
    - cron: '33 14 * * *'   # 16:33  (+46min)
    - cron: '6 16 * * *'    # 18:06  (+93min)
    - cron: '41 16 * * *'   # 18:41  (+35min)
    - cron: '22 17 * * *'   # 19:22  (+41min)
    - cron: '58 18 * * *'   # 20:58  (+96min)
  workflow_dispatch:              # auch manuell per Knopfdruck auslösbar

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Code holen
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Pakete installieren
        run: pip install -r requirements.txt

      - name: Artikel generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KICKBASE_EMAIL:    ${{ secrets.KICKBASE_EMAIL }}
          KICKBASE_PASSWORD: ${{ secrets.KICKBASE_PASSWORD }}
        run: python generate.py

      - name: Änderungen committen & pushen
        run: |
          git config user.name  "Ligaoutsider Bot"
          git config user.email "bot@ligaoutsider.de"
          git add feed.json artikel/
          [ -f kickbase.json ] && git add kickbase.json || true
          git diff --staged --quiet || git commit -m "🤖 Update $(date +'%d.%m.%Y %H:%M')"
          git push
