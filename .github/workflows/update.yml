name: Neue Artikel generieren

on:
  schedule:
    - cron: '17 6 * * *'    # 08:17 (UTC+2)
    - cron: '47 9 * * *'    # 11:47
    - cron: '23 12 * * *'   # 14:23
    - cron: '41 13 * * *'   # 15:41
    - cron: '33 17 * * *'   # 19:33
    - cron: '52 19 * * *'   # 21:52
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manueller oder externer Trigger'
        required: false
        default: 'manuell'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: generate-pipeline
      cancel-in-progress: true

    steps:
      - name: Code holen
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Pakete installieren
        run: |
          pip install -r requirements.txt
          pip list | grep -E 'trafilatura|rapidfuzz|feedparser|anthropic|requests'

      - name: Artikel generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KICKBASE_EMAIL:    ${{ secrets.KICKBASE_EMAIL }}
          KICKBASE_PASSWORD: ${{ secrets.KICKBASE_PASSWORD }}
        run: python generate.py

      - name: Änderungen committen & pushen
        run: |
          git config user.name  "Ligaoutsider Bot"
          git config user.email "bot@ligaoutsider.de"
          git add feed.json artikel/ data/ logs/ sitemap.xml || true
          [ -f kickbase.json ] && git add kickbase.json || true
          [ -d spieler ] && git add spieler/ || true
          if git diff --staged --quiet; then
            echo "Keine neuen Artikel – kein Commit nötig"
          else
            git commit -m "🤖 Update $(date +'%d.%m.%Y %H:%M')"
            git stash -u 2>/dev/null || true
            git pull --rebase origin main
            git stash pop 2>/dev/null || true
            git push
          fi
