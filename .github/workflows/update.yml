name: Neue Artikel generieren

on:
  schedule:
    - cron: '17 6 * * *'    # 08:17 (UTC+2)
    - cron: '0 8 * * *'     # 10:00
    - cron: '0 9 * * *'     # 11:00
    - cron: '0 10 * * *'    # 12:00
    - cron: '0 11 * * *'    # 13:00
    - cron: '0 12 * * *'    # 14:00
    - cron: '0 13 * * *'    # 15:00
    - cron: '0 14 * * *'    # 16:00
    - cron: '0 15 * * *'    # 17:00
    - cron: '0 16 * * *'    # 18:00
    - cron: '0 17 * * *'    # 19:00
    - cron: '58 18 * * *'   # 20:58
  workflow_dispatch:              # auch manuell per Knopfdruck auslösbar

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Code holen
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Pakete installieren
        run: pip install -r requirements.txt

      - name: Artikel generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KICKBASE_EMAIL:    ${{ secrets.KICKBASE_EMAIL }}
          KICKBASE_PASSWORD: ${{ secrets.KICKBASE_PASSWORD }}
        run: python generate.py

      - name: Änderungen committen & pushen
        run: |
          git config user.name  "Ligaoutsider Bot"
          git config user.email "bot@ligaoutsider.de"
          git add feed.json artikel/
          [ -f kickbase.json ] && git add kickbase.json || true
          [ -d spieler ] && git add spieler/ || true
          if git diff --staged --quiet; then
            echo "Keine neuen Artikel – kein Commit nötig"
          else
            git commit -m "🤖 Update $(date +'%d.%m.%Y %H:%M')"
            git pull --rebase origin main
            git push
          fi
