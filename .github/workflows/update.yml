name: Neue Artikel generieren

on:
  schedule:
    - cron: '13 7 * * *'    # 09:13
    - cron: '54 8 * * *'    # 10:54
    - cron: '31 9 * * *'    # 11:31
    - cron: '7 11 * * *'    # 13:07
    - cron: '48 12 * * *'   # 14:48
    - cron: '22 13 * * *'   # 15:22
    - cron: '55 14 * * *'   # 16:55
    - cron: '19 16 * * *'   # 18:19
    - cron: '41 17 * * *'   # 19:41
    - cron: '8 19 * * *'    # 21:08
  workflow_dispatch:              # auch manuell per Knopfdruck auslösbar

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Code holen
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Pakete installieren
        run: pip install -r requirements.txt

      - name: Artikel generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KICKBASE_EMAIL:    ${{ secrets.KICKBASE_EMAIL }}
          KICKBASE_PASSWORD: ${{ secrets.KICKBASE_PASSWORD }}
        run: python generate.py

      - name: Änderungen committen & pushen
        run: |
          git config user.name  "Ligaoutsider Bot"
          git config user.email "bot@ligaoutsider.de"
          git add feed.json artikel/
          [ -f kickbase.json ] && git add kickbase.json || true
          git diff --staged --quiet || git commit -m "🤖 Update $(date +'%d.%m.%Y %H:%M')"
          git push
