name: Neue Artikel generieren

on:
  schedule:
    - cron: '17 7 * * *'    # 09:17  – erster Run
    - cron: '52 8 * * *'    # 10:52  (+95min, langer Morgenabstand)
    - cron: '38 9 * * *'    # 11:38  (+46min)
    - cron: '19 10 * * *'   # 12:19  (+41min)
    - cron: '7 11 * * *'    # 13:07  (+48min)
    - cron: '51 11 * * *'   # 13:51  (+44min)
    - cron: '33 12 * * *'   # 14:33  (+42min)
    - cron: '22 13 * * *'   # 15:22  (+49min)
    - cron: '4 14 * * *'    # 16:04  (+42min)
    - cron: '48 14 * * *'   # 16:48  (+44min)
    - cron: '31 15 * * *'   # 17:31  (+43min)
    - cron: '29 16 * * *'   # 18:29  (+58min, Übergang Abend)
    - cron: '47 17 * * *'   # 19:47  (+78min)
    - cron: '11 19 * * *'   # 21:11  (+84min)
  workflow_dispatch:              # auch manuell per Knopfdruck auslösbar

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Code holen
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Pakete installieren
        run: pip install -r requirements.txt

      - name: Artikel generieren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KICKBASE_EMAIL:    ${{ secrets.KICKBASE_EMAIL }}
          KICKBASE_PASSWORD: ${{ secrets.KICKBASE_PASSWORD }}
        run: python generate.py

      - name: Änderungen committen & pushen
        run: |
          git config user.name  "Ligaoutsider Bot"
          git config user.email "bot@ligaoutsider.de"
          git add feed.json artikel/
          [ -f kickbase.json ] && git add kickbase.json || true
          [ -d spieler ] && git add spieler/ || true
          git diff --staged --quiet || git commit -m "🤖 Update $(date +'%d.%m.%Y %H:%M')"
          git push
