  <!-- Spieler-Modal -->
  <div id="spieler-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);overflow-y:auto;padding:20px 12px" onclick="if(event.target===this)this.style.display='none'">

  <script>
    // ─── Netlify Identity ─────────────────────────────────────────────────────
    const ADMIN_EMAIL = 'twitchpre@gmail.com';
    let isAdmin = false;

    if (window.netlifyIdentity) {
      netlifyIdentity.on('init', user => {
        if (user) showUser(user);
      });
      netlifyIdentity.on('login', user => {
        showUser(user);
        netlifyIdentity.close();
      });
      netlifyIdentity.on('logout', () => {
        isAdmin = false;
        document.getElementById('user-info').style.display = 'none';
        document.getElementById('login-btn').style.display = '';
        document.getElementById('signup-btn').style.display = '';
        renderFeed();
      });
    }

    function showUser(user) {
      const name = user.user_metadata?.full_name || user.email;
      isAdmin = user.email === ADMIN_EMAIL;
      document.getElementById('user-name').textContent = name;
      document.getElementById('user-info').style.display = 'flex';
      document.getElementById('login-btn').style.display = 'none';
      document.getElementById('signup-btn').style.display = 'none';
      renderFeed();
    }

    document.getElementById('login-btn').addEventListener('click', e => {
      e.preventDefault();
      netlifyIdentity.open('login');
    });
    document.getElementById('signup-btn').addEventListener('click', e => {
      e.preventDefault();
      netlifyIdentity.open('signup');
    });
    document.getElementById('logout-btn').addEventListener('click', e => {
      e.preventDefault();
      netlifyIdentity.logout();
    });

    // ─── Hell/Dunkel Toggle ───────────────────────────────────────────────────
    const btn   = document.getElementById('theme-toggle');
    const icon  = document.getElementById('theme-icon');
    const label = document.getElementById('theme-label');

    function setTheme(light) {
      document.body.classList.toggle('light', light);
      icon.textContent  = light ? '🌙' : '☀️';
      label.textContent = light ? 'Dunkel' : 'Hell';
      localStorage.setItem('theme', light ? 'light' : 'dark');
    }

    // Gespeicherte Präferenz laden
    setTheme(localStorage.getItem('theme') === 'light');
    btn.addEventListener('click', () => setTheme(!document.body.classList.contains('light')));
  </script>

  <script>
    // ─── Tabelle (Saison 2026/27, Saisonstart) ───────────────────────────────
    // Saison startet August 2026 – Reihenfolge nach letzter Saison
    const TABELLE_2526 = [
      { pos:1,  name:'FC Bayern München',        sp:0, pkt:0, zone:'' },
      { pos:2,  name:'Borussia Dortmund',        sp:0, pkt:0, zone:'' },
      { pos:3,  name:'RB Leipzig',               sp:0, pkt:0, zone:'' },
      { pos:4,  name:'Bayer 04 Leverkusen',      sp:0, pkt:0, zone:'' },
      { pos:5,  name:'Eintracht Frankfurt',       sp:0, pkt:0, zone:'' },
      { pos:6,  name:'VfB Stuttgart',             sp:0, pkt:0, zone:'' },
      { pos:7,  name:'TSG 1899 Hoffenheim',       sp:0, pkt:0, zone:'' },
      { pos:8,  name:'Sport-Club Freiburg',       sp:0, pkt:0, zone:'' },
      { pos:9,  name:'FC Augsburg',               sp:0, pkt:0, zone:'' },
      { pos:10, name:'1. FSV Mainz 05',           sp:0, pkt:0, zone:'' },
      { pos:11, name:'1. FC Union Berlin',        sp:0, pkt:0, zone:'' },
      { pos:12, name:'Borussia Mönchengladbach',  sp:0, pkt:0, zone:'' },
      { pos:13, name:'Hamburger SV',              sp:0, pkt:0, zone:'' },
      { pos:14, name:'1. FC Köln',                sp:0, pkt:0, zone:'' },
      { pos:15, name:'SV Werder Bremen',          sp:0, pkt:0, zone:'' },
      { pos:16, name:'FC Schalke 04',             sp:0, pkt:0, zone:'' },
      { pos:17, name:'SC Paderborn 07',           sp:0, pkt:0, zone:'' },
      { pos:18, name:'SV Elversberg',             sp:0, pkt:0, zone:'' },
    ];
    function posColor(pos) {
      if (pos <= 4)  return '#1565c0';  // Champions League
      if (pos <= 6)  return '#2e7d32';  // Europa League
      if (pos === 16) return '#f57c00'; // Relegations-Playoff
      if (pos >= 17) return '#c62828';  // Abstieg
      return null;
    }
    const LOGO_MAP = {
      'FC Bayern München':'bayern','Borussia Dortmund':'dortmund','RB Leipzig':'leipzig',
      'Bayer 04 Leverkusen':'leverkusen','Eintracht Frankfurt':'frankfurt','VfB Stuttgart':'stuttgart',
      'Borussia Mönchengladbach':'gladbach','Sport-Club Freiburg':'freiburg','1. FC Union Berlin':'union',
      '1. FSV Mainz 05':'mainz','FC Augsburg':'augsburg','SV Werder Bremen':'werder',
      'TSG Hoffenheim':'hoffenheim','TSG 1899 Hoffenheim':'hoffenheim','Hamburger SV':'hsv','1. FC Köln':'koeln',
      'FC Schalke 04':'schalke','SC Paderborn 07':'paderborn','SV Elversberg':'elversberg'
    };
    document.getElementById('tabelle-body').innerHTML = TABELLE_2526.map(t => {
      const col = posColor(t.pos);
      const posHtml = col
        ? `<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:${col};color:#fff;font-size:10px;font-weight:800">${t.pos}</span>`
        : `<span style="color:#555;font-size:12px">${t.pos}</span>`;
      const logo = LOGO_MAP[t.name] || '';
      const logoHtml = logo ? `<img src="logos/${logo}.png" style="width:18px;height:18px;object-fit:contain;vertical-align:middle" onerror="this.style.display='none'">` : '';
      return `<tr><td style="padding:4px 8px">${posHtml}</td><td>${logoHtml}</td><td>${t.name}</td><td>${t.sp}</td></tr>`;
    }).join('');

    // ─── Nächste Spiele ───────────────────────────────────────────────────────
    // Spielplan 2026/27 (Quelle: DFL 02.07.2026)
    const WETTBEWERB = {
      'BL':      { kürzel:'BL',     farbe:'#d32f2f', label:'Bundesliga' },
      'SUP':     { kürzel:'SUP',    farbe:'#e8c000', label:'Supercup' },
      'DFB':     { kürzel:'DFB',    farbe:'#2e7d32', label:'DFB-Pokal' },
      'UCL':     { kürzel:'UCL',    farbe:'#1565c0', label:'Champions League' },
      'UECL':    { kürzel:'UECL',   farbe:'#00796b', label:'Europa Conference League' },
    };

    const SPIELE = [
      { datum:'Sa 22.08.', wbw:'SUP', heim:'Borussia Dortmund',      gast:'FC Bayern München',       info:'Supercup · 20:30' },
      { datum:'Fr 28.08.', wbw:'BL',  heim:'FC Bayern München',       gast:'VfB Stuttgart',           info:'1. Spieltag · 20:30' },
      { datum:'Sa/So 29./30.08.', wbw:'BL', heim:'Borussia Dortmund',      gast:'Hamburger SV',       info:'1. Spieltag' },
      { datum:'Sa/So 29./30.08.', wbw:'BL', heim:'RB Leipzig',             gast:'Borussia Mönchengladbach', info:'1. Spieltag' },
      { datum:'Sa/So 29./30.08.', wbw:'BL', heim:'Sport-Club Freiburg',    gast:'SV Werder Bremen',   info:'1. Spieltag' },
      { datum:'Sa/So 29./30.08.', wbw:'BL', heim:'FC Augsburg',            gast:'FC Schalke 04',      info:'1. Spieltag' },
      { datum:'Sa/So 29./30.08.', wbw:'BL', heim:'1. FSV Mainz 05',        gast:'SC Paderborn 07',    info:'1. Spieltag' },
      { datum:'Sa/So 29./30.08.', wbw:'BL', heim:'1. FC Union Berlin',     gast:'Eintracht Frankfurt',info:'1. Spieltag' },
      { datum:'Sa/So 29./30.08.', wbw:'BL', heim:'1. FC Köln',             gast:'TSG Hoffenheim',     info:'1. Spieltag' },
      { datum:'Sa/So 29./30.08.', wbw:'BL', heim:'SV Elversberg',          gast:'Bayer 04 Leverkusen',info:'1. Spieltag' },
      { datum:'Di/Mi 1./2.09.',   wbw:'DFB', heim:'–',                     gast:'–',                  info:'DFB-Pokal Runde 1' },
      { datum:'Fr-So 4.-6.09.',   wbw:'BL', heim:'VfB Stuttgart',          gast:'1. FC Köln',         info:'2. Spieltag' },
      { datum:'Fr-So 4.-6.09.',   wbw:'BL', heim:'TSG Hoffenheim',         gast:'Borussia Dortmund',  info:'2. Spieltag' },
      { datum:'Fr-So 4.-6.09.',   wbw:'BL', heim:'Bayer 04 Leverkusen',    gast:'1. FC Union Berlin', info:'2. Spieltag' },
      { datum:'Fr-So 4.-6.09.',   wbw:'BL', heim:'Eintracht Frankfurt',    gast:'FC Augsburg',        info:'2. Spieltag' },
      { datum:'Fr-So 4.-6.09.',   wbw:'BL', heim:'Borussia Mönchengladbach',gast:'SV Elversberg',     info:'2. Spieltag' },
      { datum:'Fr-So 4.-6.09.',   wbw:'BL', heim:'Hamburger SV',           gast:'1. FSV Mainz 05',    info:'2. Spieltag' },
      { datum:'Fr-So 4.-6.09.',   wbw:'BL', heim:'SV Werder Bremen',       gast:'RB Leipzig',         info:'2. Spieltag' },
      { datum:'Fr-So 4.-6.09.',   wbw:'BL', heim:'FC Schalke 04',          gast:'FC Bayern München',  info:'2. Spieltag' },
      { datum:'Fr-So 4.-6.09.',   wbw:'BL', heim:'SC Paderborn 07',        gast:'Sport-Club Freiburg',info:'2. Spieltag' },
      { datum:'Di-Do 8.-10.09.',  wbw:'UCL', heim:'–',                     gast:'–',                  info:'Champions League Spieltag 1' },
    ];

    const KÜRZEL = {
      'FC Bayern München':'Bayern','Borussia Dortmund':'BVB','RB Leipzig':'Leipzig',
      'Bayer 04 Leverkusen':'Leverkusen','Eintracht Frankfurt':'Frankfurt','VfB Stuttgart':'Stuttgart',
      'Borussia Mönchengladbach':'Gladbach','Sport-Club Freiburg':'Freiburg','1. FC Union Berlin':'Union',
      '1. FSV Mainz 05':'Mainz','FC Augsburg':'Augsburg','SV Werder Bremen':'Bremen',
      'TSG Hoffenheim':'Hoffenheim','Hamburger SV':'HSV','1. FC Köln':'Köln',
      'FC Schalke 04':'Schalke','SC Paderborn 07':'Paderborn','SV Elversberg':'Elversberg','–':'–'
    };

    // Nach Datum gruppieren
    const gruppen = {};
    SPIELE.forEach(s => {
      if (!gruppen[s.datum]) gruppen[s.datum] = [];
      gruppen[s.datum].push(s);
    });

    document.getElementById('spiele-list').innerHTML = Object.entries(gruppen).map(([datum, spiele]) => {
      const spieleHtml = spiele.map(s => {
        const wb = WETTBEWERB[s.wbw];
        const badge = `<span style="background:${wb.farbe};color:#fff;font-size:8px;font-weight:800;padding:1px 4px;border-radius:2px">${wb.kürzel}</span>`;
        const heim = KÜRZEL[s.heim] || s.heim;
        const gast = KÜRZEL[s.gast] || s.gast;
        const score = s.ergebnis
          ? `<span style="font-weight:800;color:#e8c000">${s.ergebnis}</span>`
          : `<span style="color:var(--text4)">vs.</span>`;
        if (s.heim === '–') {
          return `<div style="padding:4px 12px;font-size:11px;color:var(--text4);border-bottom:1px solid var(--item-border)">${badge} ${s.info}</div>`;
        }
        return `<div style="display:flex;align-items:center;gap:7px;padding:5px 12px;border-bottom:1px solid var(--item-border)">
          ${badge}
          <span style="font-size:12px;font-weight:600;color:var(--text2)">${heim}</span>
          <span style="font-size:11px;flex-shrink:0">${score}</span>
          <span style="font-size:12px;font-weight:600;color:var(--text2)">${gast}</span>
        </div>`;
      }).join('');
      return `<li>
        <div style="padding:6px 12px 4px;font-size:10px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;background:var(--bg3);border-bottom:1px solid var(--item-border)">${datum}</div>
        ${spieleHtml}
      </li>`;
    }).join('');

    // ─── Feed & Filter ────────────────────────────────────────────────────────
    let alleArtikel   = [];
    let aktiverFilter = null; // null = alle

    function feedItem(a) {
      const slug = a.pfad.replace('artikel/', '').replace('.html', '');
      const adminBtn = isAdmin
        ? `<a href="chefred.html#${slug}" class="admin-edit-btn">✏️ News editieren</a>`
        : '';
      return `<li class="feed-item">
        <a href="${a.pfad}" class="feed-wappen-link">
          <img src="${a.wappen_url || 'https://upload.wikimedia.org/wikipedia/en/thumb/d/df/Bundesliga_logo_%282017%29.svg/120px-Bundesliga_logo_%282017%29.svg.png'}" class="feed-wappen" alt="Wappen" />
        </a>
        <div class="feed-body">
          <span class="feed-badge" style="background:${a.badge_bg};color:${a.badge_fg}">${a.badge}</span>
          <a href="${a.pfad}" class="feed-title">${a.titel}</a>
          <div class="feed-meta"><span class="feed-time">${a.datum}</span>${adminBtn}</div>
        </div>
      </li>`;
    }

    function gefiltert() {
      const q = (document.getElementById('search-input').value || '').trim().toLowerCase();
      return alleArtikel.filter(a => {
        const matchSearch = !q || a.titel.toLowerCase().includes(q);
        const matchFilter = !aktiverFilter || a.titel.toLowerCase().includes(aktiverFilter.toLowerCase());
        return matchSearch && matchFilter;
      });
    }

    function renderFeed() {
      const liste = gefiltert();
      const feed  = document.getElementById('feed');
      const btn   = document.getElementById('mehr-btn');
      const titel = document.getElementById('feed-titel');

      titel.textContent = aktiverFilter || 'Aktuell';
      feed.innerHTML = liste.length
        ? liste.slice(0, 50).map(feedItem).join('')
        : '<li class="feed-loading">Keine Artikel gefunden.</li>';
      btn.style.display = liste.length > 50 ? 'block' : 'none';
    }

    // Team-Chip Filter
    document.querySelectorAll('.team-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        const filter = btn.dataset.filter;
        if (aktiverFilter === filter) {
          aktiverFilter = null;
          btn.classList.remove('active');
        } else {
          document.querySelectorAll('.team-chip').forEach(b => b.classList.remove('active'));
          aktiverFilter = filter;
          btn.classList.add('active');
        }
        renderFeed();
      });
    });

    // Suche
    document.getElementById('search-input').addEventListener('input', () => {
      aktiverFilter = null;
      document.querySelectorAll('.team-chip').forEach(b => b.classList.remove('active'));
      renderFeed();
    });

    // ─── Torjäger & Scorer (OpenLigaDB) ──────────────────────────────────────
    let teamIcons = {};   // teamId → iconUrl  (global für Modal)
    let teamNames = {};   // teamId → teamName (global für Modal)

    async function ladeScorer() {
      try {
        // Parallel: Torjäger + Teams + letzte Spieltage für Spieler→Team-Mapping
        const [scorerRes, teamsRes, matchRes] = await Promise.all([
          fetch('https://api.openligadb.de/getgoalgetters/bl1/2025'),
          fetch('https://api.openligadb.de/getavailableteams/bl1/2025'),
          fetch('https://api.openligadb.de/getmatchdata/bl1/2025')
        ]);
        if (!scorerRes.ok) throw new Error();
        const data = await scorerRes.json();

        if (teamsRes.ok) {
          const teams = await teamsRes.json();
          teams.forEach(t => {
            teamIcons[t.teamId] = t.teamIconUrl;
            teamNames[t.teamId] = t.teamName;
          });
        }

        // goalGetterId → teamId aus Spieldaten
        const playerTeam = {};
        if (matchRes.ok) {
          const matches = await matchRes.json();
          matches.forEach(m => {
            (m.goals || []).forEach(g => {
              if (g.goalGetterID && g.scoringTeamId && !g.isOwnGoal) {
                playerTeam[g.goalGetterID] = g.scoringTeamId;
              }
            });
          });
        }

        function playerIcon(p) {
          const teamId = playerTeam[p.goalGetterId];
          const url = teamId && teamIcons[teamId];
          if (!url) return '';
          return `<img src="${url}" onerror="this.style.display='none'" style="width:18px;height:18px;object-fit:contain;flex-shrink:0">`;
        }

        function playerLi(p, valueHtml) {
          return `<li data-playerid="${p.goalGetterId}" style="cursor:pointer" title="Profil anzeigen">
            ${playerIcon(p)}
            <span class="scorer-name">${p.goalGetterName}</span>
            ${valueHtml}
          </li>`;
        }

        const top = data.sort((a,b) => b.goalCount - a.goalCount).slice(0, 8);
        document.getElementById('torjaeger-list').innerHTML = top
          .filter(p => p.goalCount > 0)
          .slice(0, 6)
          .map(p => playerLi(p, `<span class="scorer-goals">${p.goalCount}</span>`))
          .join('') || '<li style="color:var(--text4);font-size:12px;padding:10px 12px">Keine Daten</li>';

        const scorer = data
          .map(p => ({ ...p, score: p.goalCount + (p.assistCount || 0) }))
          .sort((a,b) => b.score - a.score)
          .filter(p => p.score > 0)
          .slice(0, 6);
        document.getElementById('scorer-list').innerHTML = scorer
          .map(p => playerLi(p, `<span class="scorer-goals" title="Tore+Assists">${p.score}</span>`))
          .join('') || '<li style="color:var(--text4);font-size:12px;padding:10px 12px">Keine Daten</li>';

        // Klick-Handler für beide Listen
        ['torjaeger-list','scorer-list'].forEach(listId => {
          document.getElementById(listId).addEventListener('click', e => {
            const li = e.target.closest('li[data-playerid]');
            if (li) oeffneSpielerModal(li.dataset.playerid);
          });
        });
      } catch(e) {
        ['torjaeger-list','scorer-list'].forEach(id => {
          document.getElementById(id).innerHTML = '<li style="color:var(--text4);font-size:12px;padding:10px 12px">Saison noch nicht gestartet</li>';
        });
      }
    }
    ladeScorer();

    // ─── Spieler-Modal ────────────────────────────────────────────────────────
    async function oeffneSpielerModal(goalGetterId) {
      const modal = document.getElementById('spieler-modal');
      const inhalt = document.getElementById('spieler-modal-inhalt');
      inhalt.innerHTML = '<p style="color:var(--text3);text-align:center;padding:40px 0">Lädt…</p>';
      modal.style.display = 'block';
      document.body.style.overflow = 'hidden';
      modal.addEventListener('hide', () => { document.body.style.overflow = ''; }, { once: true });

      let d;
      try {
        const r = await fetch(`spieler/${goalGetterId}.json`);
        if (!r.ok) throw new Error('nicht gefunden');
        d = await r.json();
      } catch(e) {
        inhalt.innerHTML = '<p style="color:var(--text3);text-align:center;padding:40px 0">Keine Daten verfügbar</p>';
        return;
      }

      const infos = [
        d.position && `<span>${d.position}</span>`,
        d.nation    && `<span>${d.nation}</span>`,
        d.alter     && `<span>${d.alter} Jahre</span>`,
        d.groesse   && `<span>${d.groesse}</span>`,
        d.marktwert && `<span style="color:var(--gold)">${d.marktwert}</span>`,
        d.verein    && `<span>${d.verein}</span>`,
      ].filter(Boolean).join('<span style="color:var(--text4)"> · </span>');

      // Karriere: nach Saison gruppieren
      let karriereHtml = '';
      if (d.karriere && d.karriere.length) {
        // Saisons in Reihenfolge (JSON ist bereits sortiert)
        const saisonOrder = [];
        const bySaison = {};
        d.karriere.forEach(k => {
          if (!bySaison[k.saison]) { bySaison[k.saison] = []; saisonOrder.push(k.saison); }
          bySaison[k.saison].push(k);
        });
        karriereHtml = saisonOrder.map(saison => {
          const rows = bySaison[saison].map(k => {
            const icon = teamIcons[Object.keys(teamIcons).find(id => teamNames && teamNames[id] === k.verein)] || '';
            const logoHtml = icon
              ? `<img src="${icon}" title="${k.verein}" style="width:24px;height:24px;object-fit:contain;vertical-align:middle" onerror="this.style.display='none'">`
              : `<span style="font-size:12px">${k.verein}</span>`;
            return `<tr style="border-bottom:1px solid var(--border)">
              <td style="padding:6px 8px;white-space:nowrap">${logoHtml}</td>
              <td style="padding:6px 8px;text-align:right">${k.spiele}</td>
              <td style="padding:6px 8px;text-align:right;font-weight:700;color:var(--gold)">${k.tore}</td>
              <td style="padding:6px 8px;text-align:right">${k.assists}</td>
            </tr>`;
          }).join('');
          return `<div style="margin-top:16px">
            <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Saison ${saison} · Bundesliga</div>
            <table style="width:100%;border-collapse:collapse;font-size:13px">
              <thead><tr style="color:var(--text4);font-size:11px">
                <th style="text-align:left;padding:4px 8px;font-weight:500">Verein</th>
                <th style="text-align:right;padding:4px 8px;font-weight:500">Sp</th>
                <th style="text-align:right;padding:4px 8px;font-weight:500">Tore</th>
                <th style="text-align:right;padding:4px 8px;font-weight:500">Vorlagen</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
        }).join('');
      }

      inhalt.innerHTML = `
        <div style="margin-bottom:14px">
          <div style="font-size:20px;font-weight:700;color:var(--text1)">${d.name}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:4px;line-height:1.8">${infos}</div>
        </div>
        ${karriereHtml}
      `;
    }

    document.getElementById('spieler-modal').addEventListener('click', function(e) {
      if (e.target === this) {
        this.style.display = 'none';
        document.body.style.overflow = '';
      }
    });

    // Feed laden
    fetch('feed.json')
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(artikel => {
        alleArtikel = artikel;
        renderFeed();
      })
      .catch(() => {
        document.getElementById('feed').innerHTML =
          '<li class="feed-loading">feed.json nicht gefunden – starte generate.py.</li>';
      });
  </script>

</body>
</html>
